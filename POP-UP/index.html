<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup simples</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <h1>Popup simples</h1>
    <button id="open-popup">Abrir popup</button>

    <div id="popup" class="hidden">
        <div class="popup-box">
            <p>Esta é uma mensagem simples.</p>
            <button id="close-popup">Fechar</button>
        </div>
    </div>

    <script src="js/scripts.js"></script>
</body>
</html>
