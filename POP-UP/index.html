<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup simples</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <h1>Popup simples</h1>
    <button id="open-popup">Clique aqui</button>

    <div id="popup" class="hidden">
        <div class="popup-box">
            <p>Esta é uma mensagem simples.</p>
            <div class="popup-actions">
                <button id="learn-more">Saiba mais</button>
                <button id="close-popup">Fechar</button>
            </div>
            <p id="more-info" class="hidden">Aqui está mais informação sobre como usar o popup. Você pode fechar quando terminar.</p>
        </div>
    </div>

    <script src="js/scripts.js"></script>
</body>
</html>
