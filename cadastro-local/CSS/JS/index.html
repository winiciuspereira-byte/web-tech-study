<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Local</title>
    <link rel="stylesheet" href="../stylve.css">
</head>
<body>
    <main class="container">
        <h1>Armazenamento local com JavaScript</h1>

        <form autocomplete="on">
            <section class="input-group">
                <label for="campo">Digite algo:</label>
                <input id="campo" name="campo" type="text" autocomplete="on" />
            </section>
            <button type="button" id="btnSalvar">Salvar</button>
            <h2>Valores Salvos</h2>
            <ul id="listaValores"></ul>
        </form>
    </main>
    <script src="./scripts.js"></script>
</body>
</html>
